<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UdemyFeng37</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #07111b;
            --bg-soft: #0d1a29;
            --panel: rgba(10, 22, 35, 0.88);
            --panel-strong: rgba(14, 31, 48, 0.96);
            --panel-alt: rgba(7, 18, 31, 0.92);
            --line: rgba(120, 154, 184, 0.22);
            --line-strong: rgba(164, 205, 232, 0.38);
            --text: #eef6ff;
            --muted: #8ea6bd;
            --accent: #7cf0c8;
            --accent-deep: #1fb38b;
            --warn: #ffd36c;
            --shadow: 0 30px 70px rgba(0, 0, 0, 0.34);
            --radius-xl: 30px;
            --radius-lg: 24px;
            --radius-md: 18px;
            --radius-sm: 14px;
            --shell: min(1240px, calc(100vw - 32px));
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Noto Sans TC", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(124, 240, 200, 0.12), transparent 24%),
                radial-gradient(circle at left 20%, rgba(84, 119, 255, 0.16), transparent 28%),
                linear-gradient(180deg, #09121d, #050d16 45%, #030913);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::before {
            background:
                linear-gradient(rgba(120, 154, 184, 0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120, 154, 184, 0.07) 1px, transparent 1px);
            background-size: 28px 28px;
            mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent 86%);
        }

        body::after {
            background:
                linear-gradient(90deg, transparent 0, rgba(124, 240, 200, 0.06) 50%, transparent 100%);
            mix-blend-mode: screen;
            opacity: 0.55;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .shell {
            width: var(--shell);
            margin: 0 auto;
            padding: clamp(24px, 4vw, 44px) 0 72px;
        }

        .masthead {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 20px;
            margin-bottom: 22px;
        }

        .masthead-panel,
        .workspace-panel,
        .side-panel {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius-xl);
            background: linear-gradient(180deg, rgba(11, 23, 37, 0.92), rgba(6, 15, 26, 0.9));
            box-shadow: var(--shadow);
        }

        .masthead-panel {
            padding: clamp(24px, 4vw, 40px);
        }

        .masthead-panel::before,
        .workspace-panel::before,
        .side-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(124, 240, 200, 0.08), transparent 34%),
                linear-gradient(310deg, rgba(103, 130, 255, 0.12), transparent 30%);
            pointer-events: none;
        }

        .system-tag,
        .section-tag,
        .course-subheader {
            display: inline-flex;
            align-items: center;
            width: fit-content;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid rgba(124, 240, 200, 0.22);
            background: rgba(124, 240, 200, 0.08);
            color: var(--accent);
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .system-tag::before,
        .section-tag::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(124, 240, 200, 0.7);
        }

        .brand {
            display: grid;
            gap: 14px;
        }

        .brand h1 {
            margin: 0;
            font-family: "Oxanium", sans-serif;
            font-size: clamp(34px, 6vw, 76px);
            line-height: 0.95;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .brand p,
        .panel-copy,
        .meta-copy,
        .progress-text {
            margin: 0;
            color: var(--muted);
            line-height: 1.7;
        }

        .brand p {
            max-width: 50ch;
            font-size: 15px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .tech-button,
        .ghost-button,
        .side-panel button,
        .tab-button {
            border: 0;
            cursor: pointer;
            transition: transform 180ms ease, border-color 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
        }

        .tech-button,
        .ghost-button,
        .side-panel button {
            padding: 14px 18px;
            border-radius: 999px;
            font-weight: 700;
        }

        .tech-button {
            color: #031019;
            background: linear-gradient(135deg, #a7ffe3, #7cf0c8 48%, #54d4ae);
            box-shadow: 0 12px 30px rgba(124, 240, 200, 0.22);
        }

        .ghost-button,
        .side-panel button {
            color: var(--text);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
        }

        .tech-button:hover,
        .ghost-button:hover,
        .side-panel button:hover,
        .tab-button:hover {
            transform: translateY(-2px);
        }

        .status-grid {
            display: grid;
            gap: 14px;
            padding: 24px;
            align-content: space-between;
        }

        .status-card {
            padding: 18px;
            border-radius: var(--radius-lg);
            background: rgba(8, 19, 31, 0.72);
            border: 1px solid var(--line);
        }

        .status-card strong {
            display: block;
            margin-top: 8px;
            font-family: "Oxanium", sans-serif;
            font-size: 28px;
            letter-spacing: 0.05em;
        }

        .status-card span {
            color: var(--muted);
            font-size: 13px;
        }

        .workspace {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.7fr);
            gap: 20px;
            align-items: start;
        }

        .workspace-panel {
            padding: 24px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .panel-header h2,
        .form-card h3,
        .side-panel h3 {
            margin: 0;
            font-family: "Oxanium", sans-serif;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .panel-header h2 {
            font-size: clamp(24px, 4vw, 34px);
        }

        .segmented {
            display: inline-grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            padding: 6px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--line);
        }

        .tab-button {
            padding: 12px 18px;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font-weight: 700;
        }

        .tab-button.active {
            color: var(--text);
            background: rgba(124, 240, 200, 0.1);
            box-shadow: inset 0 0 0 1px rgba(124, 240, 200, 0.14);
        }

        .course-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 14px;
        }

        .course-item {
            position: relative;
            padding: 20px;
            border-radius: var(--radius-lg);
            background: linear-gradient(180deg, rgba(14, 28, 43, 0.9), rgba(7, 19, 31, 0.92));
            border: 1px solid var(--line);
            display: grid;
            gap: 16px;
            animation: enter 540ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .course-item::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(120deg, rgba(124, 240, 200, 0.06), transparent 22%, transparent 72%, rgba(103, 130, 255, 0.08));
            pointer-events: none;
        }

        .course-topline {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            flex-wrap: wrap;
        }

        .course-heading {
            display: grid;
            gap: 8px;
        }

        .course-subheader {
            color: var(--warn);
            border-color: rgba(255, 211, 108, 0.24);
            background: rgba(255, 211, 108, 0.08);
        }

        .course-subheader::before {
            display: none;
        }

        .course-header {
            font-size: clamp(22px, 3vw, 30px);
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .progress-chip {
            min-width: 108px;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            font-family: "Oxanium", sans-serif;
            text-align: center;
            letter-spacing: 0.05em;
        }

        .course-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(230px, 0.4fr);
            gap: 16px;
        }

        .field-stack {
            display: grid;
            gap: 10px;
        }

        label {
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
        }

        textarea,
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(142, 166, 189, 0.2);
            background: rgba(4, 13, 23, 0.72);
            color: var(--text);
            outline: none;
            transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
        }

        textarea {
            min-height: 150px;
            resize: vertical;
            line-height: 1.7;
        }

        textarea:focus,
        input[type="text"]:focus {
            border-color: rgba(124, 240, 200, 0.5);
            box-shadow: 0 0 0 4px rgba(124, 240, 200, 0.08);
            transform: translateY(-1px);
        }

        .progress-block {
            display: grid;
            gap: 12px;
            align-content: start;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(142, 166, 189, 0.12);
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #7cf0c8, #9ff0ff 55%, #6d8dff);
            box-shadow: 0 0 20px rgba(124, 240, 200, 0.24);
            transition: width 220ms ease;
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .empty-state {
            display: none;
            padding: 28px;
            border-radius: var(--radius-lg);
            border: 1px dashed rgba(142, 166, 189, 0.24);
            background: rgba(255, 255, 255, 0.02);
            color: var(--muted);
        }

        .empty-state.active {
            display: block;
        }

        .composer-panel {
            display: none;
        }

        .composer-panel.active {
            display: block;
        }

        .form-card,
        .side-panel {
            padding: 24px;
        }

        .form-card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(11, 24, 39, 0.92), rgba(6, 16, 27, 0.94));
        }

        .form-stack,
        .side-stack {
            display: grid;
            gap: 16px;
        }

        .side-panel {
            display: grid;
            gap: 18px;
            position: sticky;
            top: 22px;
        }

        .meta-box {
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.03);
            display: grid;
            gap: 8px;
        }

        .meta-box strong {
            font-family: "Oxanium", sans-serif;
            font-size: 24px;
            letter-spacing: 0.04em;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translate(-50%, 140%);
            opacity: 0;
            padding: 14px 18px;
            border-radius: 999px;
            border: 1px solid rgba(124, 240, 200, 0.22);
            background: rgba(3, 12, 20, 0.94);
            color: var(--text);
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
            transition: transform 220ms ease, opacity 220ms ease;
            z-index: 20;
        }

        .toast.active {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        @keyframes enter {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .masthead,
            .workspace,
            .course-grid {
                grid-template-columns: 1fr;
            }

            .side-panel {
                position: static;
            }
        }

        @media (max-width: 680px) {
            .shell {
                width: min(calc(100vw - 20px), 100%);
                padding-top: 18px;
            }

            .panel-header,
            .course-topline {
                flex-direction: column;
                align-items: stretch;
            }

            .segmented {
                width: 100%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="masthead">
            <article class="masthead-panel">
                <div class="brand">
                    <span class="system-tag">Learning System</span>
                    <h1>UdemyFeng37</h1>
                    <p>課程列表、課程內容、進度更新與新增課程，都維持原本流程，只重做介面呈現。</p>
                </div>
                <div class="toolbar">
                    <button class="tech-button" type="button" onclick="showCourseList()">課程列表</button>
                    <button class="ghost-button" type="button" onclick="showAddCourseForm()">新增課程</button>
                </div>
            </article>

            <aside class="masthead-panel status-grid">
                <div class="status-card">
                    <span>Current View</span>
                    <strong id="activeViewLabel">課程列表</strong>
                </div>
                <div class="status-card">
                    <span>Last Sync</span>
                    <strong id="lastSync">未同步</strong>
                </div>
            </aside>
        </section>

        <section class="workspace">
            <section class="workspace-panel">
                <div class="panel-header">
                    <div>
                        <span class="section-tag">Workspace</span>
                        <h2>Course Control Panel</h2>
                        <p class="panel-copy">保留原有內容與操作，只更新視覺風格與版面。</p>
                    </div>
                    <div class="segmented" id="nav">
                        <button class="tab-button active" id="tabList" type="button" onclick="showCourseList()">課程列表</button>
                        <button class="tab-button" id="tabAdd" type="button" onclick="showAddCourseForm()">新增課程</button>
                    </div>
                </div>

                <div id="courseListView">
                    <ul class="course-list" id="courseList"></ul>
                    <div class="empty-state" id="emptyState">目前沒有課程資料。</div>
                </div>

                <div class="composer-panel" id="addCourseView">
                    <section class="form-card">
                        <div class="form-stack">
                            <div>
                                <span class="section-tag">Create</span>
                                <h3>新增課程</h3>
                                <p class="panel-copy">欄位內容與原本相同。</p>
                            </div>
                            <form class="form-stack" id="addCourseForm" onsubmit="event.preventDefault(); addCourse();">
                                <div class="field-stack">
                                    <label for="courseMain">主課程名稱</label>
                                    <input type="text" id="courseMain" name="courseMain" required>
                                </div>
                                <div class="field-stack">
                                    <label for="courseSub">子課程名稱</label>
                                    <input type="text" id="courseSub" name="courseSub" required>
                                </div>
                                <div class="field-stack">
                                    <label for="courseContext">課程內容</label>
                                    <textarea id="courseContext" name="courseContext" required></textarea>
                                </div>
                                <div class="field-stack">
                                    <label for="courseProgress">課程進度</label>
                                    <input type="text" id="courseProgress" name="courseProgress" placeholder="例如：2/10" required>
                                </div>
                                <div class="action-row">
                                    <button class="tech-button" type="submit">新增</button>
                                    <button class="ghost-button" type="button" onclick="resetAddCourseForm()">清除</button>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>
            </section>

            <aside class="side-panel">
                <div>
                    <span class="section-tag">Control</span>
                    <h3>Quick Actions</h3>
                    <p class="meta-copy">保留原本常用操作。</p>
                </div>
                <div class="side-stack">
                    <div class="meta-box">
                        <span class="meta-copy">Page</span>
                        <strong>Single Page</strong>
                    </div>
                    <div class="meta-box">
                        <span class="meta-copy">Mode</span>
                        <strong>Tech UI</strong>
                    </div>
                </div>
                <button type="button" onclick="showCourseList()">重新整理</button>
                <button type="button" onclick="showAddCourseForm()">開啟新增課程</button>
                <button type="button" onclick="scrollToTop()">Go Top</button>
                <button type="button" onclick="scrollToBottom()">Go Bottom</button>
            </aside>
        </section>
    </main>

    <div class="toast" id="toast">完成</div>

    <script>
        let courseCache = [];

        function makeCourseKey(courseMain, courseSub) {
            return `${courseMain}__${courseSub}`.replace(/\s+/g, "-").replace(/[^\w\u4e00-\u9fff-]/g, "_");
        }

        function parseProgress(progressText) {
            const match = String(progressText || "").trim().match(/^(\d+)\s*\/\s*(\d+)$/);
            if (!match) {
                return { current: 0, total: 0, percent: 0, valid: false };
            }

            const current = Number(match[1]);
            const total = Number(match[2]);
            const percent = total > 0 ? Math.min(100, Math.max(0, (current / total) * 100)) : 0;

            return { current, total, percent, valid: total > 0 };
        }

        function setActiveTab(view) {
            const isList = view === "list";
            document.getElementById("courseListView").style.display = isList ? "block" : "none";
            document.getElementById("addCourseView").classList.toggle("active", !isList);
            document.getElementById("tabList").classList.toggle("active", isList);
            document.getElementById("tabAdd").classList.toggle("active", !isList);
            document.getElementById("activeViewLabel").textContent = isList ? "課程列表" : "新增課程";
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("active");
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => toast.classList.remove("active"), 2600);
        }

        function updateLastSync() {
            document.getElementById("lastSync").textContent = new Date().toLocaleTimeString("zh-TW", {
                hour: "2-digit",
                minute: "2-digit"
            });
        }

        function renderCourse(course, index) {
            const courseList = document.getElementById("courseList");
            const key = makeCourseKey(course.courseMain, course.courseSub);
            const { percent, valid, current, total } = parseProgress(course.courseProgress);
            const courseItem = document.createElement("li");

            courseItem.className = "course-item";
            courseItem.style.animationDelay = `${Math.min(index * 70, 280)}ms`;
            courseItem.id = `course-${key}`;

            courseItem.innerHTML = `
                <div class="course-topline">
                    <div class="course-heading">
                        <span class="course-subheader">${course.courseSub}</span>
                        <div class="course-header">${course.courseMain}</div>
                    </div>
                    <div class="progress-chip">${valid ? `${current}/${total}` : course.courseProgress || "N/A"}</div>
                </div>
                <div class="course-grid">
                    <div class="field-stack">
                        <label for="context-${key}">課程內容</label>
                        <textarea id="context-${key}" rows="5">${course.courseContext || ""}</textarea>
                    </div>
                    <div class="progress-block">
                        <div class="field-stack">
                            <label for="progress-${key}">課程進度</label>
                            <input type="text" id="progress-${key}" value="${course.courseProgress || ""}">
                        </div>
                        <div class="progress-track" aria-hidden="true">
                            <div class="progress-fill" id="progress-bar-${key}" style="width: ${percent.toFixed(2)}%;"></div>
                        </div>
                        <div class="progress-text" id="progress-text-${key}">
                            ${valid ? `完成率 ${percent.toFixed(1)}%` : "請使用 2/10 這類格式。"}
                        </div>
                        <div class="action-row">
                            <button class="tech-button" type="button" onclick="saveCourseData(${JSON.stringify(course.courseMain)}, ${JSON.stringify(course.courseSub)})">保存</button>
                        </div>
                    </div>
                </div>
            `;

            courseList.appendChild(courseItem);
        }

        function renderCourseList(courses) {
            const courseList = document.getElementById("courseList");
            const emptyState = document.getElementById("emptyState");

            courseList.innerHTML = "";
            emptyState.classList.toggle("active", courses.length === 0);
            courses.forEach((course, index) => renderCourse(course, index));
        }

        function showCourseList() {
            setActiveTab("list");
            loadCourseData();
        }

        function showAddCourseForm() {
            setActiveTab("add");
        }

        function resetAddCourseForm() {
            document.getElementById("addCourseForm").reset();
        }

        function saveCourseData(courseMain, courseSub) {
            const key = makeCourseKey(courseMain, courseSub);
            const courseContext = document.getElementById(`context-${key}`).value.trim();
            const courseProgress = document.getElementById(`progress-${key}`).value.trim();
            const parsed = parseProgress(courseProgress);

            if (!parsed.valid) {
                showToast("進度格式錯誤");
                return;
            }

            fetch("UpdateCourse.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    courseMain,
                    courseSub,
                    courseContext,
                    courseProgress
                })
            })
                .then((response) => response.json())
                .then((responseData) => {
                    if (responseData.status === "success") {
                        document.getElementById(`progress-bar-${key}`).style.width = `${parsed.percent.toFixed(2)}%`;
                        document.getElementById(`progress-text-${key}`).textContent = `完成率 ${parsed.percent.toFixed(1)}%`;
                        updateLastSync();
                        showToast("保存成功");
                    } else {
                        showToast("更新失敗");
                    }
                })
                .catch(() => showToast("連線失敗"));
        }

        function addCourse() {
            const courseMain = document.getElementById("courseMain").value.trim();
            const courseSub = document.getElementById("courseSub").value.trim();
            const courseContext = document.getElementById("courseContext").value.trim();
            const courseProgress = document.getElementById("courseProgress").value.trim();

            if (!parseProgress(courseProgress).valid) {
                showToast("進度格式錯誤");
                return;
            }

            fetch("AddCourse.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    courseMain,
                    courseSub,
                    courseContext,
                    courseProgress
                })
            })
                .then((response) => response.json())
                .then((responseData) => {
                    if (responseData.success) {
                        showToast("新增成功");
                        resetAddCourseForm();
                        showCourseList();
                    } else {
                        showToast("新增失敗");
                    }
                })
                .catch(() => showToast("連線失敗"));
        }

        function loadCourseData() {
            fetch("ReadCourse.php")
                .then((response) => response.json())
                .then((data) => {
                    courseCache = Array.isArray(data) ? data : [];
                    renderCourseList(courseCache);
                    updateLastSync();
                })
                .catch(() => {
                    courseCache = [];
                    renderCourseList(courseCache);
                    showToast("讀取失敗");
                });
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function scrollToBottom() {
            window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        }

        window.onload = function() {
            showCourseList();
        };
    </script>
</body>
</html>
